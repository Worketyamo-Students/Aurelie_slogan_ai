<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" sizes="32*32" href="assets/images/logo_icon.png">

    <title>Sloganify</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" type="text/css" href="assets/css/index.css">
    <style type="text/tailwindcss">
      @theme {
        --font-main:"Plus Jakarta Sans", sans-serif;
        --font-secondary: "Nunito Sans", sans-serif;
        --color-banner:#03045E;
        --color-primary:#0077B6;
        --color-white-background:#FFFFFF;
        --color-text:#03071E;
        --color-footer:#CAF0F8;
      }
    </style>
</head>
<body  class="bg-white-background overflow-hidden h-screen w-screen px-0 py-0 border-0 box-border fixed">

  <header class="h-[5rem] w-full flex items-center mt-[2rem] px-[2rem] lg:px-[5rem]">
    <a href="index.html">
      <img class="lg:w-60 lg:h-60" src="assets/images/logo.svg" alt="logo">
    </a>
  </header>

  <section class="bg-banner h-[20rem] w-full flex flex-col items-center justify-center mt-[1rem] ">
    <div class="h-[12rem] w-[34rem]  lg:w-[54rem]">
      <h1 class="font-secondary font-bold text-white-background text-[2rem] lg:text-[3rem] ">Create powerful slogans with AI ✨</h1><br>
      <p class="font-secondary font-semibold text-white-background text-[1.6rem] lg:text-[2rem]">Enter your business name and a short description, let our AI generate catchy and memorable slogans for your brand.</p>
    </div>
  </section>

  <section class=" h-[10rem] w-full flex items-center justify-center ">
    <div class="h-auto w-full flex justify-between mx-[2rem] lg:mx-[30rem]">
      <a href="assets/autres_pages_html/sign_up.html"><button class="font-main font-bold text-[1.8rem] h-[4rem] lg:h-[5rem] w-[15rem] text-white-background bg-primary rounded-xl flex items-center justify-center transform transition-transform duration-300 ease-in-out hover:scale-110">Sign up</button></a>
      <a href="assets/autres_pages_html/login.html"><button class="font-main font-bold text-[1.8rem] h-[4rem] lg:h-[5rem] w-[15rem] text-primary border-[0.1rem] border-text rounded-xl flex items-center justify-center transform transition-transform duration-300 ease-in-out hover:scale-110">Log in</button></a>
    </div> 
  </section>

  <section class="h-[20rem] lg:h-[14rem] bg-banner flex justify-center items-center ">
    <div class="font-bold font-secondary text-white-background text-[1.8rem] lg:text-[2rem] flex flex-col w-[34rem] h-[14rem] lg:h-[10rem] lg:w-[45rem] ">
      <p>✨ Enjoy 3 free slogan generations per day!</p><br>
      <p>👑 Upgrade to Premium for unlimited access</p>
    </div>
  </section>

  <footer class="bg-footer h-[6rem] w-full flex items-center justify-center mt-[1rem] lg:mt-[4rem] rounded-t-lg">
    <img src="assets/images/logo.svg" alt="logo">
  </footer>
    
</body>
</html>
