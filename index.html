<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sloganify</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" type="text/css" href="assets/css/index.css">
    <style type="text/tailwindcss">
      @theme {
        --font-main:"Plus Jakarta Sans", sans-serif;
        --font-secondary: "Nunito Sans", sans-serif;
        --color-banner:#03045E;
        --color-primary:#0077B6;
        --color-white-background:#FFFFFF;
        --color-text:#03071E;
        --color-footer:#CAF0F8;
      }
    </style>
</head>
<body  class="bg-white-background overflow-hidden h-screen w-screen px-0 py-0 border-0 box-border">

  <header class="h-[5rem] w-full flex items-center mt-[2rem] px-[2rem]">
    <a href="index.html">
      <img src="assets/images/logo.svg" alt="logo">
    </a>
  </header>

  <section class="bg-banner h-[20rem] w-full flex flex-col items-center justify-center mt-[1rem] ">
    <div class="h-[12rem] w-[34rem]">
      <h1 class="font-secondary font-bold text-white-background text-[2rem] ">Create powerful slogans with AI ✨</h1><br>
      <p class="font-secondary font-semibold text-white-background text-[1.6rem]">Enter your business name and a short description, let our AI generate catchy and memorable slogans for your brand.</p>
    </div>
  </section>
   
    
</body>
</html>
