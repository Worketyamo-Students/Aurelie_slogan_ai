<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32*32" href="../images/logo_icon.png">
    <title>Sign up</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" type="text/css" href="../css/index.css">
    <style type="text/tailwindcss">
      @theme {
        --font-main:"Plus Jakarta Sans", sans-serif;
        --font-secondary: "Nunito Sans", sans-serif;
        --color-primary:#0077B6;
        --color-white-background:#FFFFFF;
        --color-text:#03071E;
        --color-second-text:#AAAAAA;
        --color-bord:#BBBBBB;
      }
    </style>
</head>
<body  class="bg-white-background overflow-hidden h-screen w-screen px-0 py-0 border-0 box-border">

  <header class="h-[5rem] w-full flex items-center mt-[2rem] px-[2rem] lg:px-[5rem]">
    <a href="../../index.html">
      <img class="lg:w-60 lg:h-60"  src="../images/logo.svg" alt="logo">
    </a>
  </header>

  <section class="h-[50rem] w-full flex flex-col px-[2rem] mt-[3rem] lg:items-center">
    <h1 class="font-main font-bold text-text text-[2rem] lg:text-[3rem]">Sign up for an account</h1>
    <form class="h-[44rem] lg:h-[50rem] w-full lg:w-[45rem] flex flex-col gap-y-[3rem] items-center justify-center  shadow-lg rounded-lg  lg:px-[3rem] mt-[1rem]">
      <div class=" h-[16rem] w-full flex flex-col items-center justify-between">
        <label for="name"><input class="h-[4rem] w-[30rem] lg:w-[34rem] font-secondary font-semibold text-[1.4rem]  border-[0.1rem] border-bord rounded-lg pl-[1rem]" type="text" name="name" id="name" placeholder="Username"></label>
        <label for="email"><input class="h-[4rem] w-[30rem] lg:w-[34rem] font-secondary font-semibold text-[1.4rem] text-text border-[0.1rem] border-bord rounded-lg pl-[1rem]"  type="email" name="email" placeholder="E-mail address"></label>
        <label for="password"><input class="h-[4rem] w-[30rem] lg:w-[34rem] font-secondary font-semibold text-[1.4rem] text-text border-[0.1rem] border-bord rounded-lg pl-[1rem] bg-[url(../images/eye-closed.svg)] bg-no-repeat bg-[right_1rem_center]" type="password" name="password" placeholder="Password"></label>
      </div>

      <div class=" h-[16rem] w-full flex flex-col items-center justify-between">
        <button class="font-main font-bold text-white-background text-[1.8rem] bg-primary h-[4rem] w-[30rem] lg:w-[34rem] flex items-center justify-center rounded-lg">Sign  up</button>
        <p class="font-main font-bold text-second-text text-[1.4rem]">_Or _</p>
        <button class="h-[4rem] w-[30rem] lg:w-[34rem] border-[0.1rem] border-bord rounded-lg pl-[1rem] flex justify-center items-center"><img src="../images/logo_google.svg"></button>
      </div>

    </form>
  </section>

    
</body>
</html>
