<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" type="text/css" href="assets/css/index.css">
    <style type="text/tailwindcss">
      @theme {
        --font-main:"Plus Jakarta Sans", sans-serif;
        --font-secondary: "Nunito Sans", sans-serif;
        --color-primary:#0077B6;
        --color-white-background:#FFFFFF;
        --color-text:#03071E;
        --color-second-text:#AAAAAA;
        --color-bord:#BBBBBB;
      }
    </style>
</head>
<body  class="bg-white-background overflow-hidden h-screen w-screen px-0 py-0 border-0 box-border">

  <header class="h-[5rem] w-full flex items-center mt-[1rem] px-[1rem] lg:px-[5rem]">
    <a href="../../index.html">
      <img  src="../images/logo.svg" alt="logo">
    </a>
  </header>

  <section class="h-[32rem] w-full flex flex-col px-[1rem] mt-[1.5rem]">
    <h1 class="font-main font-bold text-text text-[1.4rem]">Sign up for an account</h1>
    <form class="h-[30rem] w-full flex flex-col gap-y-[2rem] items-center justify-center  shadow-lg rounded-lg px-[1rem] mt-[1rem]">
      <div class="h-[12rem] w-full flex flex-col justify-between">
        <label for="name"><input class="h-[3rem] w-full font-secondary font-semibold text-[1.2rem]  border-[0.1rem] border-bord rounded-lg pl-[1rem]" type="text" name="name" id="name" placeholder="Username"></label>
        <label for="email"><input class="h-[3rem] w-full font-secondary font-semibold text-[1.2rem] text-text border-[0.1rem] border-bord rounded-lg pl-[1rem]"  type="email" name="email" placeholder="E-mail address"></label>
        <label for="password"><input class="h-[3rem] w-full font-secondary font-semibold text-[1.2rem] text-text border-[0.1rem] border-bord rounded-lg pl-[1rem]" type="password" name="password" placeholder="Password"></label>
      </div>

      <div class="h-[10rem] w-full flex flex-col justify-between">
        <button class="font-main font-bold text-white-background text-[1.4rem] bg-primary h-[3rem] w-full flex items-center justify-center rounded-lg">Sign  up</button>
        <p class="font-main font-bold text-second-text text-[1.4rem] text-center">_Or _</p>
        <button class="h-[3rem] w-full border-[0.1rem] border-bord rounded-lg pl-[1rem] flex justify-center items-center"><img src="../images/logo_google.svg"></button>
      </div>

    </form>
  </section>

    
</body>
</html>
